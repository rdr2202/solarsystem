<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Explorer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Comic Sans MS', 'Arial', sans-serif; color: white; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .panel { background: rgba(0, 0, 0, 0.7); padding: 15px 30px; border-radius: 15px; border: 3px solid #4a90e2; text-align: center; pointer-events: auto; }
        h1 { margin: 0 0 10px 0; color: #ffeb3b; text-shadow: 2px 2px 4px #000; }
        #question-text { font-size: 24px; font-weight: bold; }
        #score-panel { position: absolute; top: 20px; right: 20px; font-size: 20px; }
        #feedback { font-size: 32px; font-weight: bold; margin-top: 20px; transition: opacity 0.5s; opacity: 0; text-shadow: 2px 2px 4px #000; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        button { font-size: 24px; padding: 10px 30px; background-color: #4CAF50; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px #2E7D32; font-family: inherit; margin-top: 20px; }
        button:hover { background-color: #45a049; }
        button:active { box-shadow: 0 0 #2E7D32; transform: translateY(4px); }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="panel">
            <h1>Solar System Explorer</h1>
            <div id="question-text">Loading...</div>
            <div id="feedback">Correct!</div>
        </div>
        <div class="panel" id="score-panel">
            Score: <span id="score-value">0</span>
        </div>
    </div>

    <div id="start-screen">
        <h1 style="font-size: 48px;">Solar System Explorer</h1>
        <p style="font-size: 24px; max-width: 600px; text-align: center;">Welcome Space Explorer! Find the planets to answer the questions. Use your mouse to rotate and zoom around the Sun. Click on a planet to select it!</p>
        <button id="start-btn">Start Game</button>
    </div>

    <script>
        // Game Logic Setup
        const questions = [
            { text: "Which planet is closest to the Sun?", target: "mercury" },
            { text: "Which planet do we live on?", target: "earth" },
            { text: "Which is the largest planet in our solar system?", target: "jupiter" },
            { text: "Which planet is known as the Red Planet?", target: "mars" },
            { text: "Which planet has beautiful, large rings?", target: "saturn" },
            { text: "Which is the hottest planet?", target: "venus" },
            { text: "Which planet spins on its side?", target: "uranus" },
            { text: "Which is the furthest planet from the Sun?", target: "neptune" },
        ];
        
        let currentQuestionIndex = 0;
        let score = 0;
        let gameActive = false;
        let nextQuestionTimeout;

        // Shuffle questions
        questions.sort(() => Math.random() - 0.5);

        const questionEl = document.getElementById('question-text');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('score-value');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');

        // Three.js Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Add stars to background
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({color: 0xFFFFFF, size: 0.1});
        const starsVertices = [];
        for(let i=0; i<2000; i++) {
            const x = (Math.random() - 0.5) * 400;
            const y = (Math.random() - 0.5) * 400;
            const z = (Math.random() - 0.5) * 400;
            starsVertices.push(x,y,z);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 70);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 200;
        controls.minDistance = 15;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040); // Soft white light
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2.5, 300);
        scene.add(sunLight);

        // Planet Data
        const planetsData = {
            sun: { radius: 8, color: 0xffcc00, distance: 0, speed: 0 },
            mercury: { radius: 0.8, color: 0xa8a8a8, distance: 14, speed: 0.02 },
            venus: { radius: 1.5, color: 0xe0c9a6, distance: 19, speed: 0.015 },
            earth: { radius: 1.6, color: 0x2b82c9, distance: 25, speed: 0.01 },
            mars: { radius: 1.2, color: 0xc1440e, distance: 31, speed: 0.008 },
            jupiter: { radius: 4.5, color: 0xd39c7e, distance: 43, speed: 0.004 },
            saturn: { radius: 3.8, color: 0xead6b8, distance: 58, speed: 0.003, hasRing: true, ringColor: 0xa6957a },
            uranus: { radius: 2.5, color: 0x4b70dd, distance: 72, speed: 0.002 },
            neptune: { radius: 2.4, color: 0x274687, distance: 85, speed: 0.001 }
        };

        const planets = {};
        const clickables = [];

        // Create Sun
        const sunGeo = new THREE.SphereGeometry(planetsData.sun.radius, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: planetsData.sun.color });
        const sunMesh = new THREE.Mesh(sunGeo, sunMat);
        sunMesh.name = 'sun';
        scene.add(sunMesh);
        
        // Create Planets
        const orbitMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });

        Object.keys(planetsData).forEach(key => {
            if (key === 'sun') return;
            
            const data = planetsData[key];
            
            // Planet Mesh
            const geo = new THREE.SphereGeometry(data.radius, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.6 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.name = key;
            
            // Orbit Group (to rotate around sun)
            const orbitGroup = new THREE.Group();
            orbitGroup.add(mesh);
            scene.add(orbitGroup);
            
            mesh.position.x = data.distance;
            
            // Saturn's Ring
            if (data.hasRing) {
                const ringGeo = new THREE.RingGeometry(data.radius * 1.4, data.radius * 2.2, 32);
                const ringMat = new THREE.MeshStandardMaterial({ color: data.ringColor, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.rotation.x = Math.PI / 2 + 0.3; // Tilt
                mesh.add(ringMesh);
            }
            
            // Orbit Trail
            const trailGeo = new THREE.RingGeometry(data.distance - 0.05, data.distance + 0.05, 64);
            const trailMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
            const trailMesh = new THREE.Mesh(trailGeo, trailMat);
            trailMesh.rotation.x = Math.PI / 2;
            scene.add(trailMesh);

            planets[key] = {
                mesh: mesh,
                orbitGroup: orbitGroup,
                data: data
            };
            
            clickables.push(mesh);
        });

        // Raycaster for interactions
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function showFeedback(message, isCorrect) {
            feedbackEl.innerText = message;
            feedbackEl.style.color = isCorrect ? '#4CAF50' : '#f44336';
            feedbackEl.style.opacity = 1;
            
            setTimeout(() => {
                feedbackEl.style.opacity = 0;
            }, 2000);
        }

        function setNextQuestion() {
            gameActive = true;
            if (currentQuestionIndex < questions.length) {
                questionEl.innerText = questions[currentQuestionIndex].text;
            } else {
                questionEl.innerText = "You found all the planets! Great job!";
                gameActive = false;
                setTimeout(() => {
                    startScreen.style.display = 'flex';
                    startScreen.querySelector('h1').innerText = "Game Over!";
                    startScreen.querySelector('p').innerText = `Final Score: ${score} / ${questions.length * 10}`;
                    startBtn.innerText = "Play Again";
                    currentQuestionIndex = 0;
                    score = 0;
                    questions.sort(() => Math.random() - 0.5);
                }, 3000);
            }
        }

        window.addEventListener('pointerdown', (event) => {
            // Only process clicks if game is active and not clicking on UI buttons
            if (!gameActive || event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickables);

            if (intersects.length > 0) {
                const clickedPlanet = intersects[0].object.name;
                const targetPlanet = questions[currentQuestionIndex].target;

                if (clickedPlanet === targetPlanet) {
                    // Correct
                    gameActive = false; // pause game logic while showing feedback
                    score += 10;
                    scoreEl.innerText = score;
                    showFeedback("Correct! That's " + clickedPlanet.charAt(0).toUpperCase() + clickedPlanet.slice(1) + "!", true);
                    currentQuestionIndex++;
                    clearTimeout(nextQuestionTimeout);
                    nextQuestionTimeout = setTimeout(setNextQuestion, 2000);
                } else {
                    // Incorrect
                    showFeedback("Oops! That's " + clickedPlanet.charAt(0).toUpperCase() + clickedPlanet.slice(1) + ". Try again!", false);
                    score = Math.max(0, score - 2); // Small penalty
                    scoreEl.innerText = score;
                }
            }
        });

        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            scoreEl.innerText = score;
            gameActive = true;
            setNextQuestion();
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate planets around sun
            Object.values(planets).forEach(p => {
                p.orbitGroup.rotation.y += p.data.speed;
                p.mesh.rotation.y += 0.02; // Self rotation
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
